<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control IR ESP32</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    font-family: Arial;
    margin: 15px;
    background: #f5f5f5;
    text-align: center;
}

h2 { color: #333; }

.section {
    margin-top: 15px;
}

button {
    padding: 10px;
    margin: 4px;
    border: none;
    background: #007BFF;
    color: white;
    border-radius: 6px;
    min-width: 60px;
}

button:hover { background: #0056b3; }

.grid {
    display: grid;
    grid-template-columns: repeat(3, 70px);
    justify-content: center;
    gap: 8px;
}

.numbers {
    display: grid;
    grid-template-columns: repeat(3, 70px);
    justify-content: center;
    gap: 8px;
}

#status {
    padding: 6px 10px;
    background: #ddd;
    border-radius: 8px;
    font-size: 12px;
    min-width: 120px;
}
</style>
</head>

<body>

<h2>📡 Control ESP32</h2>

<div style="display:flex; justify-content:center; align-items:center; gap:10px;">
    <button onclick="connect()">🔌 Conectar</button>
    <div id="status">⚪ Desconectado</div>
</div>

<div class="section">
    <button onclick="send('POWER')">POWER</button>
    <button onclick="send('MUTE')">MUTE</button>
    <button onclick="send('RESET')">RESET</button>
</div>

<div class="section">
    <button onclick="send('F1')">F1</button>
    <button onclick="send('F2')">F2</button>
    <button onclick="send('F3')">F3</button>
    <button onclick="send('F4')">F4</button>
    <button onclick="send('F5')">F5</button>
</div>

<div class="section grid">
    <div></div>
    <button onclick="send('UP')">⬆️</button>
    <div></div>

    <button onclick="send('LEFT')">⬅️</button>
    <button onclick="send('OK')">OK</button>
    <button onclick="send('RIGHT')">➡️</button>

    <div></div>
    <button onclick="send('DOWN')">⬇️</button>
    <div></div>
</div>

<div class="section numbers">
    <button onclick="send('1')">1</button>
    <button onclick="send('2')">2</button>
    <button onclick="send('3')">3</button>

    <button onclick="send('4')">4</button>
    <button onclick="send('5')">5</button>
    <button onclick="send('6')">6</button>

    <button onclick="send('7')">7</button>
    <button onclick="send('8')">8</button>
    <button onclick="send('9')">9</button>
    
    <button onclick="send('EXIT')">EXIT</button>
    <button onclick="send('0')">0</button>
    <button onclick="send('EDIT')">EDIT</button>
    
</div>

<div class="section">
    <button onclick="send('CLOCK')">CLOCK</button>
    <button onclick="send('12H')">12H</button>
    <button onclick="send('24H')">24H</button>
</div>




<div class="section">
    <button onclick="send('UP_DOWN')">UP/DOWN</button>
    <button onclick="send('INT')">INT</button>
    <button onclick="send('BRILLO')">BRILLO</button>
</div>

<div class="section">
    <button onclick="send('+10')">+10</button>
</div>



<script>
let ws;
const ESP_IP = "192.168.1.70"; // 👈 FIJA AQUÍ

const statusBox = document.getElementById("status");

function setStatus(text, color = "#ddd") {
    statusBox.innerText = text;
    statusBox.style.background = color;
}

function connect() {
    setStatus("🔌 Conectando...", "#ffe58a");

    let protocol = location.protocol === "https:" ? "ws://" : "ws://";
    ws = new WebSocket(${protocol}${ESP_IP}/ws);

    ws.onopen = () => setStatus("🟢 Conectado", "#b7eb8f");

    ws.onmessage = (event) => {
        setStatus("📩 Comando " + event.data, "#91d5ff");
    };

    ws.onclose = () => {
        setStatus("🔴 Desconectado", "#ffa39e");
        setTimeout(connect, 2000);
    };

    ws.onerror = () => ws.close();
}

function send(cmd) {
    if (ws && ws.readyState === 1) {
        ws.send(cmd);
        setStatus("📤 " + cmd, "#91d5ff");
    } else {
        setStatus("❌ Sin conexión", "#ffa39e");
    }
}

// registrar service worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
